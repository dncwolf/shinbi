data:
  raw_dir: data/raw
  processed_dir: data/processed
  raw_fav_dir: fav
  raw_not_fav_dir: not_fav
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  image_size: 224
  not_fav_target_count: 1100
  jpeg_quality: 85

model:
  embed_dim: 3840
  dropout: 0.5

train:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0001
  early_stopping_patience: 15
  scheduler_patience: 3
  model_save_path: models/best_model.pth

device: mps
